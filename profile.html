<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile • Attendance System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-zinc-100">
    <script src="shared.js"></script>
    
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar (same as before) -->
        <aside id="sidebar" class="bg-white border-r border-zinc-200 flex flex-col transition-all duration-300 w-64">
            <div class="px-6 py-8 border-b border-zinc-100 flex items-center justify-between">
                <div class="flex items-center gap-3 overflow-hidden">
                    <div class="w-8 h-8 bg-violet-600 text-white rounded-xl flex items-center justify-center font-bold text-xl shrink-0">A</div>
                    <span class="text-2xl font-semibold text-zinc-900 whitespace-nowrap sidebar-label">Academia</span>
                </div>
                <button id="mobile-close-sidebar" class="lg:hidden text-zinc-500 text-xl"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-4 flex-1 overflow-y-auto">
                <nav class="space-y-1">
          <!-- Dashboard - Admin Only -->
          <a href="dashboard.html" class="admin-only flex items-center gap-3 px-4 py-3 text-zinc-700 hover:bg-zinc-100 rounded-2xl font-medium">
            <i class="fas fa-home w-5"></i> <span class="sidebar-label">Dashboard</span>
          </a>
          
          <!-- Attendance - Everyone can see -->
          <a href="attendance.html" class="admin-only flex items-center gap-3 px-4 py-3 text-zinc-700 hover:bg-zinc-100 rounded-2xl font-medium">
            <i class="fas fa-calendar-check w-5"></i> <span class="sidebar-label">Attendance</span>
          </a>
          
          <!-- Teachers - Admin Only -->
          <a href="teachers.html" class="admin-only flex items-center gap-3 px-4 py-3 text-zinc-700 hover:bg-zinc-100 rounded-2xl font-medium">
            <i class="fas fa-chalkboard-teacher w-5"></i> <span class="sidebar-label">Teachers</span>
          </a>
          
          <!-- Add Staff - Admin Only -->
          <a href="add-staff.html" class="admin-only flex items-center gap-3 px-4 py-3 text-zinc-700 hover:bg-zinc-100 rounded-2xl font-medium">
            <i class="fas fa-user-plus w-5"></i> <span class="sidebar-label">Add Staff</span>
          </a>
          
          <!-- Reports - Admin Only -->
          <!-- <a href="reports.html" class="admin-only flex items-center gap-3 px-4 py-3 text-zinc-700 hover:bg-zinc-100 rounded-2xl font-medium">
            <i class="fas fa-chart-bar w-5"></i> <span class="sidebar-label">Reports</span>
          </a> -->

          <!-- Profile - Admin Only -->
          <a href="profile.html" class="flex items-center gap-3 px-4 py-3 bg-violet-50 text-violet-700 rounded-2xl font-semibold">
            <i class="fas fa-user-plus w-5"></i> <span class="sidebar-label">Profile</span>
          </a>
          
          <hr class="my-4 border-zinc-200">
          
          <!-- Logout - Everyone can see -->
          <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 text-red-600 hover:bg-red-50 rounded-2xl font-medium">
            <i class="fas fa-sign-out-alt w-5"></i> <span class="sidebar-label">Logout</span>
          </button>
        </nav>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Header -->
            <header class="bg-white border-b border-zinc-200 px-8 py-5 flex items-center justify-between shrink-0">
                <div class="flex items-center gap-4">
                    <button id="sidebar-toggle" class="text-2xl text-zinc-500 hover:text-zinc-700 lg:block hidden"><i class="fas fa-bars"></i></button>
                    <button id="mobile-menu-btn" class="text-2xl text-zinc-500 lg:hidden"><i class="fas fa-bars"></i></button>
                    <div class="flex items-center text-sm text-zinc-500">
                        <span class="hover:text-zinc-700 cursor-pointer" onclick="window.location='dashboard.html'">Dashboard</span>
                        <span class="mx-2">›</span>
                        <span class="font-medium text-zinc-900">Profile</span>
                    </div>
                </div>
                
                <div class="flex items-center gap-6">
                    <div class="flex items-center bg-zinc-100 rounded-3xl px-4 py-2 text-sm">
                        <i class="fas fa-calendar-day mr-2 text-zinc-400"></i>
                        <span id="header-date" class="font-medium text-zinc-700"></span>
                    </div>
                    
                    <div class="relative">
                        <button id="profileDropdownBtn" class="flex items-center gap-3 focus:outline-none">
                            <div class="text-right hidden sm:block">
                                <div class="font-semibold text-sm" id="header-name">Loading...</div>
                                <div class="text-xs text-zinc-500" id="header-role">Admin</div>
                            </div>
                            <div class="w-10 h-10 bg-violet-200 rounded-2xl overflow-hidden">
                                <img id="header-avatar" src="" alt="" class="w-full h-full object-cover">
                            </div>
                            <i class="fas fa-chevron-down text-xs text-zinc-400"></i>
                        </button>
                        
                        <div id="profileDropdown" class="hidden absolute right-0 mt-3 w-56 bg-white rounded-2xl shadow-xl border border-zinc-100 z-50">
                            <a href="profile.html" class="flex items-center gap-3 px-5 py-4 hover:bg-zinc-50 rounded-t-2xl"><i class="fas fa-user w-5 text-violet-600"></i> Profile</a>
                            <a href="#" class="flex items-center gap-3 px-5 py-4 hover:bg-zinc-50"><i class="fas fa-cog w-5 text-zinc-600"></i> Settings</a>
                            <hr class="border-zinc-100">
                            <button onclick="logout()" class="w-full text-left flex items-center gap-3 px-5 py-4 hover:bg-red-50 rounded-b-2xl text-red-600"><i class="fas fa-sign-out-alt w-5"></i> Logout</button>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <div class="flex-1 overflow-y-auto p-8">
                <div class="max-w-3xl mx-auto">
                    <div class="bg-white rounded-3xl shadow-sm overflow-hidden">
                        <div class="px-8 py-6 border-b border-zinc-100">
                            <h2 class="text-2xl font-bold">My Profile</h2>
                            <p class="text-zinc-500 text-sm mt-1">Manage your personal information</p>
                        </div>
                        
                        <form onsubmit="handleProfileUpdate(event)" class="p-8">
                            <!-- Profile Photo -->
                            <div class="flex items-center gap-6 mb-8">
                                <div class="relative">
                                    <div class="w-24 h-24 bg-violet-100 rounded-3xl overflow-hidden">
                                        <img id="profile-avatar" src="" alt="" class="w-full h-full object-cover">
                                    </div>
                                    <label for="profilePhotoUpload" class="absolute bottom-0 right-0 w-8 h-8 bg-violet-600 text-white rounded-xl flex items-center justify-center cursor-pointer hover:bg-violet-700">
                                        <i class="fas fa-camera text-sm"></i>
                                    </label>
                                    <input type="file" id="profilePhotoUpload" accept="image/*" class="hidden" onchange="updateProfilePhoto(event)">
                                </div>
                                <div>
                                    <h3 class="text-xl font-bold" id="display-name">Admin User</h3>
                                    <p class="text-zinc-500" id="display-role">Super Admin</p>
                                </div>
                            </div>
                            
                            <!-- Personal Information -->
                            <div class="space-y-6">
                                <h3 class="text-lg font-semibold">Personal Information</h3>
                                
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div>
                                        <label class="block text-sm font-medium text-zinc-700 mb-2">Full Name</label>
                                        <input type="text" id="profileName" value="Admin User" class="w-full border border-zinc-200 rounded-2xl px-4 py-3 focus:outline-none focus:border-violet-400">
                                    </div>
                                    
                                    <div>
                                        <label class="block text-sm font-medium text-zinc-700 mb-2">Email</label>
                                        <input type="email" id="profileEmail" value="admin@academia.edu" class="w-full border border-zinc-200 rounded-2xl px-4 py-3 focus:outline-none focus:border-violet-400">
                                    </div>
                                    
                                    <div>
                                        <label class="block text-sm font-medium text-zinc-700 mb-2">Phone</label>
                                        <input type="tel" id="profilePhone" value="+91 98765 43210" class="w-full border border-zinc-200 rounded-2xl px-4 py-3 focus:outline-none focus:border-violet-400">
                                    </div>
                                    
                                    <div>
                                        <label class="block text-sm font-medium text-zinc-700 mb-2">Role</label>
                                        <input type="text" id="profileRole" value="Super Admin" readonly class="w-full bg-zinc-50 border border-zinc-200 rounded-2xl px-4 py-3">
                                    </div>
                                </div>
                                
                                <!-- Change Password Section -->
                                <div class="mt-8 pt-6 border-t border-zinc-100">
                                    <h3 class="text-lg font-semibold mb-4">Change Password</h3>
                                    
                                    <div class="space-y-4">
                                        <div>
                                            <label class="block text-sm font-medium text-zinc-700 mb-2">Current Password</label>
                                            <input type="password" id="currentPassword" class="w-full border border-zinc-200 rounded-2xl px-4 py-3 focus:outline-none focus:border-violet-400">
                                        </div>
                                        
                                        <div>
                                            <label class="block text-sm font-medium text-zinc-700 mb-2">New Password</label>
                                            <input type="password" id="newPassword" class="w-full border border-zinc-200 rounded-2xl px-4 py-3 focus:outline-none focus:border-violet-400">
                                        </div>
                                        
                                        <div>
                                            <label class="block text-sm font-medium text-zinc-700 mb-2">Confirm New Password</label>
                                            <input type="password" id="confirmPassword" class="w-full border border-zinc-200 rounded-2xl px-4 py-3 focus:outline-none focus:border-violet-400">
                                        </div>
                                    </div>
                                </div>
                                
                                <!-- Form Actions -->
                                <div class="flex items-center justify-end gap-4 mt-8 pt-6 border-t border-zinc-100">
                                    <button type="button" onclick="resetProfileForm()" class="px-8 py-3 rounded-2xl font-medium bg-zinc-100 hover:bg-zinc-200 text-zinc-700 transition">Reset</button>
                                    <button type="submit" class="bg-violet-600 hover:bg-violet-700 text-white px-8 py-3 rounded-2xl font-semibold flex items-center gap-2 transition">
                                        <i class="fas fa-save"></i> Save Changes
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        checkAuth();
        
        document.addEventListener('DOMContentLoaded', function() {
            loadProfileData();
            updateHeaderInfo();
            setupSidebar();
            setupDropdown();
            
            document.getElementById('header-date').innerText = new Date().toLocaleDateString('en-IN', { 
                weekday: 'long', month: 'short', day: 'numeric' 
            });
        });
        
        function loadProfileData() {
            const admin = appData.data.admin;
            
            document.getElementById('profile-avatar').src = admin.avatar || 'https://i.pravatar.cc/128?u=admin';
            document.getElementById('profileName').value = admin.name || 'Admin User';
            document.getElementById('profileEmail').value = admin.email || 'admin@academia.edu';
            document.getElementById('profilePhone').value = admin.phone || '+91 98765 43210';
            document.getElementById('profileRole').value = admin.role || 'Super Admin';
            
            document.getElementById('display-name').innerText = admin.name || 'Admin User';
            document.getElementById('display-role').innerText = admin.role || 'Super Admin';
        }
        
        function updateProfilePhoto(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('profile-avatar').src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }
        
        function handleProfileUpdate(e) {
    e.preventDefault();
    
    // Update admin data
    appData.data.admin.name = document.getElementById('profileName').value;
    appData.data.admin.email = document.getElementById('profileEmail').value;
    appData.data.admin.phone = document.getElementById('profilePhone').value;
    appData.data.admin.avatar = document.getElementById('profile-avatar').src;
    appData.data.admin.role = document.getElementById('profileRole').value;
    
    // Handle password change if provided
    const currentPwd = document.getElementById('currentPassword').value;
    const newPwd = document.getElementById('newPassword').value;
    const confirmPwd = document.getElementById('confirmPassword').value;
    
    if (currentPwd || newPwd || confirmPwd) {
        if (newPwd !== confirmPwd) {
            showToast('New passwords do not match', 'error');
            return;
        }
        if (newPwd.length < 6) {
            showToast('Password must be at least 6 characters', 'error');
            return;
        }
        appData.data.admin.password = newPwd;
        showToast('Password updated successfully');
    }
    
    appData.save();
    
    // ALSO SAVE TO LOCALSTORAGE for attendance page
    const profileForStorage = {
        name: appData.data.admin.name,
        role: appData.data.admin.role,
        email: appData.data.admin.email,
        phone: appData.data.admin.phone,
        avatar: appData.data.admin.avatar
    };
    localStorage.setItem('adminProfile', JSON.stringify(profileForStorage));
    
    // Dispatch event for current page
    window.dispatchEvent(new CustomEvent('profileUpdated', { detail: profileForStorage }));
    
    // Update header
    updateHeaderInfo();
    
    showToast('Profile updated successfully');
    
    // Clear password fields
    document.getElementById('currentPassword').value = '';
    document.getElementById('newPassword').value = '';
    document.getElementById('confirmPassword').value = '';
}
        function resetProfileForm() {
            loadProfileData();
            document.getElementById('currentPassword').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
        }
        
        function updateHeaderInfo() {
            const admin = appData.data.admin;
            document.getElementById('header-name').innerText = admin.name || 'Admin User';
            document.getElementById('header-role').innerText = admin.role || 'Admin';
            document.getElementById('header-avatar').src = admin.avatar || 'https://i.pravatar.cc/128?u=admin';
        }
        
        // Sidebar and dropdown functions (reuse)
        function setupSidebar() {
            const sidebar = document.getElementById('sidebar');
            const toggleBtn = document.getElementById('sidebar-toggle');
            const mobileBtn = document.getElementById('mobile-menu-btn');
            const mobileClose = document.getElementById('mobile-close-sidebar');
            
            toggleBtn?.addEventListener('click', () => {
                sidebar.classList.toggle('w-64');
                sidebar.classList.toggle('w-20');
                document.querySelectorAll('.sidebar-label').forEach(label => {
                    label.classList.toggle('lg:hidden');
                });
            });
            
            mobileBtn?.addEventListener('click', () => {
                sidebar.classList.remove('hidden');
            });
            
            mobileClose?.addEventListener('click', () => {
                sidebar.classList.add('hidden');
            });
        }
        
        function setupDropdown() {
            const dropdownBtn = document.getElementById('profileDropdownBtn');
            const dropdown = document.getElementById('profileDropdown');
            
            dropdownBtn?.addEventListener('click', (e) => {
                e.stopPropagation();
                dropdown.classList.toggle('hidden');
            });
            
            document.addEventListener('click', (e) => {
                if (!dropdownBtn?.contains(e.target)) {
                    dropdown?.classList.add('hidden');
                }
            });
        }
    </script>
</body>
</html>
