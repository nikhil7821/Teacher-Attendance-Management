    /* Admin-only elements - controlled by JavaScript, no display property here */

    /* Page specific styles */

    .error-input { border-color: #ef4444 !important; }

        font-weight: 600;

    /* Collapsed sidebar styles */

    <script>
    // Check admin access immediately
    if (!isAdmin()) {
        window.location.href = 'attendance.html';
    } else {
        checkAuth();
    }

    // Global variable to store teachers
    let teachersData = [];

    // Function to load teachers from appData
    function loadTeachersFromAppData() {
        if (appData && appData.data && appData.data.teachers) {
            teachersData = appData.data.teachers;
            console.log('Teachers loaded:', teachersData.length);
            return teachersData;
        }
        return [];
    }

    // Function to refresh the entire page data
    function refreshTeachersPage() {
        console.log('Refreshing teachers page...');
        
        // Reload teachers from appData
        const teachers = loadTeachersFromAppData();
        
        // Update header
        updateHeaderInfo();
        
        // Re-populate filters
        const deptSelect = document.getElementById('filterDept');
        if (deptSelect) {
            deptSelect.innerHTML = '<option value="">All Departments</option>';
            const departments = [...new Set(teachers.map(t => t.department))];
            departments.forEach(dept => {
                const option = document.createElement('option');
                option.value = dept;
                option.textContent = dept;
                deptSelect.appendChild(option);
            });
        }
        
        // Re-render the table
        renderTeachersTable(teachers);
    }

    document.addEventListener('DOMContentLoaded', function() {
        console.log('DOM loaded, initializing teachers page');
        
        // Load teachers data
        loadTeachersFromAppData();
        
        // Initialize the page
        updateHeaderInfo();
        populateFilters();
        renderTeachersTable(teachersData);
        setupSidebar();
        setupDropdown();
        
        document.getElementById('header-date').innerText = new Date().toLocaleDateString('en-IN', { 
            weekday: 'long', month: 'short', day: 'numeric' 
        });
        
        // Live search
        document.getElementById('searchTeacher').addEventListener('input', applyFilters);
    });

    function updateHeaderInfo() {
        const admin = appData.data.admin;
        document.getElementById('header-name').innerText = admin.name || 'Admin User';
        document.getElementById('header-role').innerText = admin.role || 'Admin';
        document.getElementById('header-avatar').src = admin.avatar || 'https://i.pravatar.cc/128?u=admin';
    }

    function populateFilters() {
        const deptSelect = document.getElementById('filterDept');
        if (!deptSelect) return;
        
        deptSelect.innerHTML = '<option value="">All Departments</option>';
        const departments = [...new Set(teachersData.map(t => t.department))];
        departments.forEach(dept => {
            const option = document.createElement('option');
            option.value = dept;
            option.textContent = dept;
            deptSelect.appendChild(option);
        });
    }

    function renderTeachersTable(filteredTeachers = teachersData) {
        const tbody = document.getElementById('teachers-tbody');
        tbody.innerHTML = '';
        
        if (!filteredTeachers || filteredTeachers.length === 0) {
            // Show empty state
            const row = document.createElement('tr');
            row.innerHTML = `<td colspan="7" class="text-center py-8 text-zinc-500">No teachers found. Add a new teacher to get started.</td>`;
            tbody.appendChild(row);
            return;
        }
        
        filteredTeachers.forEach(teacher => {
            const row = document.createElement('tr');
            row.className = 'border-b border-zinc-100 last:border-0 hover:bg-zinc-50';
            row.innerHTML = `
                <td class="px-8 py-4 font-medium">${teacher.id}</td>
                <td class="px-4 py-4">
                    <div class="flex items-center gap-3">
                        <img src="${teacher.profilePhoto || 'https://i.pravatar.cc/32?u=' + teacher.id}" class="w-8 h-8 rounded-xl object-cover">
                        <span>${teacher.name}</span>
                    </div>
                </td>
                <td class="px-4 py-4">${teacher.department}</td>
                <td class="px-4 py-4">${teacher.email}</td>
                <td class="px-4 py-4">${teacher.phone}</td>
                <td class="px-4 py-4 text-center">
                    <span class="px-3 py-1 rounded-full text-xs font-medium ${getStatusColor(teacher.status)}">${teacher.status}</span>
                </td>
                <td class="px-4 py-4">
                    <div class="flex items-center justify-center gap-2">
                        <button onclick="viewTeacher('${teacher.id}')" class="p-2 text-blue-600 hover:bg-blue-50 rounded-lg transition-all hover:scale-110" title="View"><i class="fas fa-eye"></i></button>
                        <button onclick="editTeacher('${teacher.id}')" class="p-2 text-amber-600 hover:bg-amber-50 rounded-lg transition-all hover:scale-110" title="Edit"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteTeacher('${teacher.id}')" class="p-2 text-red-600 hover:bg-red-50 rounded-lg transition-all hover:scale-110" title="Delete"><i class="fas fa-trash"></i></button>
                    </div>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    // Listen for data updates from other pages
    window.addEventListener('appDataUpdated', function() {
        console.log('Data updated event received, refreshing teachers page');
        refreshTeachersPage();
    });

    // Also listen for storage events (for cross-tab sync)
    window.addEventListener('storage', function(e) {
        if (e.key === 'attendanceAppData') {
            console.log('Storage changed, reloading teachers');
            // Force reload appData from localStorage
            if (appData) {
                const freshData = JSON.parse(localStorage.getItem('attendanceAppData'));
                if (freshData) {
                    appData.data = freshData;
                    refreshTeachersPage();
                }
            }
        }
    });

    function applyFilters() {
        const searchTerm = document.getElementById('searchTeacher').value.toLowerCase();
        const dept = document.getElementById('filterDept').value;
        const status = document.getElementById('filterStatus').value;
        
        const filtered = teachersData.filter(t => {
            const matchSearch = !searchTerm || 
                t.name.toLowerCase().includes(searchTerm) || 
                t.id.toLowerCase().includes(searchTerm) || 
                t.email.toLowerCase().includes(searchTerm);
            const matchDept = !dept || t.department === dept;
            const matchStatus = !status || t.status === status;
            
            return matchSearch && matchDept && matchStatus;
        });
        
        renderTeachersTable(filtered);
    }

    function deleteTeacher(id) {
        if (confirm('Are you sure you want to delete this teacher?')) {
            teachersData = teachersData.filter(t => t.id !== id);
            appData.data.teachers = teachersData;
            appData.save();
            applyFilters();
            showToast('Teacher deleted successfully');
            
            // Trigger update event
            window.dispatchEvent(new CustomEvent('appDataUpdated'));
        }
    }

    function getStatusColor(status) {
        switch(status) {
            case 'Present': return 'bg-emerald-100 text-emerald-700';
            case 'Absent': return 'bg-red-100 text-red-700';
            case 'Leave': return 'bg-amber-100 text-amber-700';
            case 'Late': return 'bg-orange-100 text-orange-700';
            case 'Half Day': return 'bg-blue-100 text-blue-700';
            default: return 'bg-zinc-100 text-zinc-700';
        }
    }

    // Sidebar and dropdown functions
    function setupSidebar() {
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('sidebar-toggle');
        const mobileBtn = document.getElementById('mobile-menu-btn');
        const mobileClose = document.getElementById('mobile-close-sidebar');
        
        toggleBtn?.addEventListener('click', () => {
            sidebar.classList.toggle('w-64');
            sidebar.classList.toggle('w-20');
            document.querySelectorAll('.sidebar-label').forEach(label => {
                label.classList.toggle('lg:hidden');
            });
        });
        
        mobileBtn?.addEventListener('click', () => {
            sidebar.classList.remove('hidden');
        });
        
        mobileClose?.addEventListener('click', () => {
            sidebar.classList.add('hidden');
        });
    }

    function setupDropdown() {
        const dropdownBtn = document.getElementById('profileDropdownBtn');
        const dropdown = document.getElementById('profileDropdown');
        
        dropdownBtn?.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdown.classList.toggle('hidden');
        });
        
        document.addEventListener('click', (e) => {
            if (!dropdownBtn?.contains(e.target)) {
                dropdown?.classList.add('hidden');
            }
        });
    }

                <div class="flex-1">

                    <p class="text-zinc-600 flex items-center gap-2 mb-3">
                        <i class="fas fa-briefcase text-violet-500"></i>

                    </p>
                    <div class="flex items-center gap-4">
                        <span class="px-4 py-2 rounded-full text-sm font-medium ${getStatusColor(teacher.status)} shadow-sm">${teacher.status}</span>

                            <i class="fas fa-id-card text-zinc-400"></i>
                            ID: ${teacher.id}
                        </span>
                    </div>

            <div class="grid grid-cols-2 gap-6">
                <!-- Contact Information Card -->
                <div class="info-card bg-white rounded-2xl shadow-sm border border-zinc-100 overflow-hidden hover:shadow-md transition-all">
                    <div class="bg-gradient-to-r from-blue-500 to-blue-600 px-4 py-3">
                        <h4 class="text-white font-medium flex items-center gap-2">
                            <i class="fas fa-address-card"></i>
                            Contact Information
                        </h4>
                    </div>
                    <div class="p-5 space-y-4">
                        <div class="flex items-center gap-3 text-zinc-600">
                            <div class="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center text-blue-600">
                                <i class="fas fa-envelope"></i>
                            </div>
                            <span class="text-sm">${teacher.email}</span>
                        </div>
                        <div class="flex items-center gap-3 text-zinc-600">
                            <div class="w-8 h-8 bg-green-100 rounded-lg flex items-center justify-center text-green-600">
                                <i class="fas fa-phone"></i>
                            </div>
                            <span class="text-sm">${teacher.phone}</span>
                        </div>
                        <div class="flex items-center gap-3 text-zinc-600">
                            <div class="w-8 h-8 bg-purple-100 rounded-lg flex items-center justify-center text-purple-600">
                                <i class="fas fa-map-marker-alt"></i>
                            </div>
                            <span class="text-sm">${teacher.address || 'Not specified'}</span>
                        </div>
                    </div>
                </div>
                
                <!-- Personal Information Card -->
                <div class="info-card bg-white rounded-2xl shadow-sm border border-zinc-100 overflow-hidden hover:shadow-md transition-all">
                    <div class="bg-gradient-to-r from-purple-500 to-purple-600 px-4 py-3">
                        <h4 class="text-white font-medium flex items-center gap-2">
                            <i class="fas fa-user"></i>
                            Personal Information
                        </h4>
                    </div>
                    <div class="p-5 space-y-4">
                        <div class="flex items-center gap-3 text-zinc-600">
                            <div class="w-8 h-8 bg-amber-100 rounded-lg flex items-center justify-center text-amber-600">
                                <i class="fas fa-calendar"></i>
                            </div>
                            <span class="text-sm">DOB: ${dob}</span>
                        </div>
                        <div class="flex items-center gap-3 text-zinc-600">
                            <div class="w-8 h-8 bg-indigo-100 rounded-lg flex items-center justify-center text-indigo-600">
                                <i class="fas fa-graduation-cap"></i>
                            </div>
                            <span class="text-sm">Qualification: ${teacher.qualification || 'Not specified'}</span>

                    </div>
                </div>
                
                <!-- Employment Details Card -->
                <div class="info-card bg-white rounded-2xl shadow-sm border border-zinc-100 overflow-hidden hover:shadow-md transition-all">

    function closeViewModal() {
        const modal = document.getElementById('viewTeacherModal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
    }

    // Edit Teacher Functions
    function editTeacher(id) {
        const teacher = teachersData.find(t => t.id === id);
        if (!teacher) return;
        
        // Populate form fields
        document.getElementById('editTeacherId').value = teacher.id;
        document.getElementById('editName').value = teacher.name || '';
        document.getElementById('editTeacherIdField').value = teacher.id;
        document.getElementById('editEmail').value = teacher.email || '';
        document.getElementById('editPhone').value = teacher.phone || '';
        document.getElementById('editDepartment').value = teacher.department || '';
        document.getElementById('editStatus').value = teacher.status || 'Present';
        document.getElementById('editQualification').value = teacher.qualification || '';
        document.getElementById('editAddress').value = teacher.address || '';
        document.getElementById('editDob').value = teacher.dob || '';
        
        // Set profile preview
        const preview = document.getElementById('editProfilePreview');
        if (teacher.profilePhoto) {
            preview.src = teacher.profilePhoto;
        } else {
            preview.src = 'https://i.pravatar.cc/128?u=' + teacher.id;
        }
        
        const modal = document.getElementById('editTeacherModal');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
    }

    function closeEditModal() {
        const modal = document.getElementById('editTeacherModal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
    }

    function previewEditImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('editProfilePreview').src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function saveTeacherEdit(event) {
        event.preventDefault();
        
        const id = document.getElementById('editTeacherId').value;
        const teacherIndex = teachersData.findIndex(t => t.id === id);
        
        if (teacherIndex === -1) return;
        
        // Get the profile photo (either existing or new upload)
        const profilePhoto = document.getElementById('editProfilePreview').src;
        
        // Preserve the existing joinDate from the teacher data
        const existingTeacher = teachersData[teacherIndex];
        
        // Update teacher data but keep the original joinDate
        teachersData[teacherIndex] = {
            ...existingTeacher,
            name: document.getElementById('editName').value,
            email: document.getElementById('editEmail').value,
            phone: document.getElementById('editPhone').value,
            department: document.getElementById('editDepartment').value,
            status: document.getElementById('editStatus').value,
            qualification: document.getElementById('editQualification').value,
            address: document.getElementById('editAddress').value,
            dob: document.getElementById('editDob').value,
            profilePhoto: profilePhoto.includes('pravatar') ? existingTeacher.profilePhoto : profilePhoto
            // joinDate is preserved from existingTeacher
        };
        
        // Update appData
        appData.data.teachers = teachersData;
        appData.save();
        
        // Refresh the table
        renderTeachersTable(teachersData);
        
        // Close modal
        closeEditModal();
        
        // Show success message
        showToast('Teacher updated successfully', 'success');
        
        // Trigger update event
        window.dispatchEvent(new CustomEvent('appDataUpdated'));
    }

    // Add showToast function if it doesn't exist
    if (typeof showToast !== 'function') {
        function showToast(message, type = 'success') {
            // Create toast container if it doesn't exist
            let toastContainer = document.getElementById('toast-container');
            if (!toastContainer) {
                toastContainer = document.createElement('div');
                toastContainer.id = 'toast-container';
                toastContainer.className = 'fixed bottom-4 right-4 z-50 flex flex-col gap-2';
                document.body.appendChild(toastContainer);
            }
            
            // Create toast
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-emerald-600' : 'bg-blue-600';
            toast.className = `${bgColor} text-white px-6 py-3 rounded-2xl shadow-lg flex items-center gap-3 animate-slide-up`;
            toast.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'}"></i>
                <span>${message}</span>
            `;
            
            toastContainer.appendChild(toast);
            
            // Remove after 3 seconds
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
    }

    // Close modals when clicking outside
    document.addEventListener('click', function(e) {
        const viewModal = document.getElementById('viewTeacherModal');
        const editModal = document.getElementById('editTeacherModal');
        
        if (e.target === viewModal) {
            closeViewModal();
        }
        if (e.target === editModal) {
            closeEditModal();
        }
    });

    // Close modals with Escape key
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            closeViewModal();
            closeEditModal();
        }
    });

    // Manual refresh function for testing
    window.refreshTeachers = function() {
        refreshTeachersPage();
        showToast('Teachers table refreshed');
    };
    </script>
