<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance System • Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="auth.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .login-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="login-bg min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden">
        <div class="px-8 py-10">
            <div class="flex justify-center mb-8">
                <div class="w-16 h-16 bg-violet-600 text-white rounded-2xl flex items-center justify-center font-bold text-3xl">A</div>
            </div>
            <h2 class="text-3xl font-bold text-center text-zinc-800 mb-2">Welcome Back</h2>
            <p class="text-center text-zinc-500 mb-8">Sign in to Attendance Management System</p>
            
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-zinc-700 mb-2">Username</label>
                        <div class="relative">
                            <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-zinc-400"></i>
                            <input type="text" id="username" class="w-full bg-zinc-50 border border-zinc-200 rounded-2xl pl-12 pr-4 py-3 focus:outline-none focus:border-violet-400" placeholder="Enter username">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-zinc-700 mb-2">Password</label>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-zinc-400"></i>
                            <input type="password" id="password" class="w-full bg-zinc-50 border border-zinc-200 rounded-2xl pl-12 pr-4 py-3 focus:outline-none focus:border-violet-400" placeholder="Enter password">
                        </div>
                    </div>
                    <div class="flex items-center justify-between">
                        <label class="flex items-center gap-2">
                            <input type="checkbox" class="rounded text-violet-600">
                            <span class="text-sm text-zinc-600">Remember me</span>
                        </label>
                        <a href="#" class="text-sm text-violet-600 hover:text-violet-700">Forgot password?</a>
                    </div>
                    <button type="submit" class="w-full bg-violet-600 hover:bg-violet-700 text-white font-semibold py-3 rounded-2xl transition-colors flex items-center justify-center gap-2">
                        <i class="fas fa-sign-in-alt"></i>
                        Sign In
                    </button>
                </div>
            </form>
            
            <div class="mt-6 text-center text-sm text-zinc-500">
                <p>Use your credentials provided by admin</p>
            </div>
        </div>
    </div>

<script>
    // SINGLE handleLogin function that uses static + auth.js dynamic login
    function handleLogin(e) {
        e.preventDefault();

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();

        console.log('Login attempt for username:', username);

        // ✅ 1. STATIC LOGIN (Hardcoded Admin)
        if (username === "maya@gmail.com" && password === "maya123") {

            const staticUser = {
                username: "maya@gmail.com",
                role: "admin"
            };

            // Store session
            sessionStorage.setItem('isLoggedIn', 'true');
            sessionStorage.setItem('user', JSON.stringify(staticUser));

            console.log('Static admin login successful');

            // Redirect to admin dashboard
            window.location.href = 'dashboard.html';
            return;
        }

        // ✅ 2. DYNAMIC LOGIN (auth.js)
        if (typeof login === "function" && login(username, password)) {
            console.log('Dynamic login successful, redirect handled in auth.js');
        } else {
            alert('Invalid credentials! Please check your username and password.');
        }
    }

    // ✅ Check if already logged in
    if (sessionStorage.getItem('isLoggedIn') === 'true') {
        const user = JSON.parse(sessionStorage.getItem('user'));

        if (user && user.role === 'admin') {
            window.location.href = 'dashboard.html';
        } else if (user) {
            window.location.href = 'attendance.html';
        }
    }

    // ✅ Debug function to check users from console
    window.checkLoginUsers = function() {
        if (typeof getAllUsers === 'function') {
            console.log('Users in system:', getAllUsers());
        } else {
            console.log('Users in localStorage:', JSON.parse(localStorage.getItem('users')));
        }
    };
</script>
</body>
</html>
